<header class="site-header">
  <div class="container nav-wrap">
    <a class="brand" href="{{ "" | relURL }}" aria-label="Eclipse Hepheistos home">
      <img src="{{ "images/hepheistos/logo.svg" | relURL }}" alt="Eclipse Hepheistos logo">
      <span>Eclipse Hepheistos</span>
    </a>
    <nav class="main-nav" aria-label="Main navigation">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
    <a class="btn btn-primary btn-small" href="{{ "getting-started/" | relURL }}">{{ .Site.Params.call_for_action_text }}</a>
  </div>
</header>
